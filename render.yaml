services:
  - type: web
    name: controle-entregas-tarefas
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_FILE
        value: /var/data/production.json
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: NOTIFICATION_WEBHOOK_URL
        sync: false
    disks:
      - name: controle-operacional-data
        mountPath: /var/data
        sizeGB: 1
