services:
  - type: web
    name: controle-entregas-tarefas
    runtime: node
    plan: starter
    buildCommand: npm ci
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: controle-entregas-tarefas-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /var/data/uploads-production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: NOTIFICATION_WEBHOOK_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: operacao@empresa.com
      - key: NOTIFICATION_EMAIL_TO
        sync: false
    disk:
      name: controle-operacional-uploads
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: controle-entregas-tarefas-db
    databaseName: controle_entregas_tarefas
    user: controle_entregas_tarefas
    plan: starter
